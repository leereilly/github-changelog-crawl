<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Latest from the GitHub Changelog — A Long Time Ago…</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=News+Cycle:wght@700&family=Pathway+Gothic+One&display=swap" rel="stylesheet">
<style>
  :root {
    --crawl-yellow: #feda4a;
    --crawl-duration: 90s;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #000;
    color: var(--crawl-yellow);
    overflow: hidden;
    font-family: "News Cycle", "Pathway Gothic One", "Franklin Gothic Medium",
                 "Arial Narrow", Arial, sans-serif;
  }

  /* starfield */
  .stars, .stars::before, .stars::after {
    position: fixed;
    inset: 0;
    background-repeat: repeat;
    background-image:
      radial-gradient(1px 1px at 20% 30%, #fff, transparent 60%),
      radial-gradient(1px 1px at 75% 80%, #fff, transparent 60%),
      radial-gradient(1px 1px at 50% 50%, #fff, transparent 60%),
      radial-gradient(2px 2px at 10% 70%, #fff, transparent 60%),
      radial-gradient(1px 1px at 85% 15%, #fff, transparent 60%),
      radial-gradient(1px 1px at 35% 90%, #fff, transparent 60%),
      radial-gradient(1px 1px at 65% 40%, #fff, transparent 60%),
      radial-gradient(1.5px 1.5px at 5% 25%, #fff, transparent 60%);
    background-size: 400px 400px, 350px 350px, 300px 300px,
                     500px 500px, 450px 450px, 380px 380px,
                     420px 420px, 360px 360px;
  }
  .stars::before { content: ""; transform: translate(120px, 80px); opacity: 0.7; }
  .stars::after  { content: ""; transform: translate(-90px, 200px); opacity: 0.5; }

  /* intro "A long time ago…" line, classic blue */
  .intro {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    color: #4bd5ee;
    font-family: "News Cycle", sans-serif;
    font-size: clamp(20px, 3vw, 36px);
    letter-spacing: 0.04em;
    opacity: 0;
    animation: introFade 5s ease 0.4s forwards;
    z-index: 5;
    text-align: center;
    padding: 0 1rem;
  }
  @keyframes introFade {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* the perspective stage */
  .stage {
    position: fixed;
    inset: 0;
    perspective: 400px;
    perspective-origin: 50% 100%;
    overflow: hidden;
  }
  /* fade top of crawl into the stars without masking the 3D layer */
  .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(0,0,0,1) 0%,
      rgba(0,0,0,0.55) 8%,
      rgba(0,0,0,0.15) 22%,
      rgba(0,0,0,0) 38%);
    pointer-events: none;
    z-index: 2;
  }

  .tilt {
    position: absolute;
    left: 50%;
    bottom: 0;
    width: min(92vw, 900px);
    height: 100%;
    transform: translateX(-50%) rotateX(25deg);
    transform-origin: 50% 100%;
  }

  .crawl {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    color: var(--crawl-yellow);
    font-weight: 700;
    text-align: justify;
    font-size: clamp(32px, 5vw, 60px);
    line-height: 1.5;
    letter-spacing: 0.02em;
    text-shadow: 0 0 2px rgba(255, 232, 31, 0.25);
    animation: crawl var(--crawl-duration) linear 6s forwards;
    will-change: top;
  }

  @keyframes crawl {
    0%   { top: 95%; opacity: 1; }
    70%  { opacity: 1; }
    100% { top: var(--crawl-end, -500%); opacity: 0; }
  }

  .crawl .title-block {
    text-align: center;
    margin-bottom: 2.5em;
  }
  .crawl .episode {
    text-transform: uppercase;
    font-size: 0.7em;
    letter-spacing: 0.18em;
    margin-bottom: 0.6em;
  }
  .crawl h1 {
    font-family: "Pathway Gothic One", "News Cycle", sans-serif;
    text-transform: uppercase;
    font-size: 1.5em;
    line-height: 1.1;
    letter-spacing: 0.04em;
    margin-bottom: 0.4em;
  }
  .crawl .date {
    font-size: 0.6em;
    opacity: 0.85;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .crawl p { margin-bottom: 1.1em; }
  .crawl p:last-child { margin-bottom: 0; }

  .status {
    position: fixed;
    bottom: 1rem;
    left: 1rem;
    color: #888;
    font-size: 12px;
    font-family: ui-monospace, Menlo, monospace;
    z-index: 10;
  }
  .replay {
    position: fixed;
    bottom: 1rem;
    right: 1rem;
    background: transparent;
    color: var(--crawl-yellow);
    border: 1px solid var(--crawl-yellow);
    padding: 6px 12px;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 0.1em;
    cursor: pointer;
    text-transform: uppercase;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .replay.show { opacity: 0.8; }
  .replay:hover { opacity: 1; background: rgba(254, 218, 74, 0.1); }

  @media (prefers-reduced-motion: reduce) {
    .crawl { animation-duration: 30s; }
    .intro { animation-duration: 3s; }
  }
</style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <div class="intro" id="intro">A long time ago, in a repository far, far away…</div>
  <div class="stage">
    <div class="tilt">
    <div class="crawl" id="crawl" aria-live="polite">
      <div class="title-block">
        <div class="episode">Episode IV</div>
        <h1>Latest from the GitHub Changelog</h1>
        <div class="date" id="date"></div>
      </div>
      <div id="body"><p>Loading transmission from the GitHub feed…</p></div>
    </div>
    </div>
  </div>
  <div class="status" id="status"></div>
  <button class="replay" id="replay" type="button">Replay</button>

<script>
(function () {
  const FEED_URL = "https://github.blog/changelog/feed/";
  const bodyEl   = document.getElementById("body");
  const dateEl   = document.getElementById("date");
  const crawlEl  = document.getElementById("crawl");
  const statusEl = document.getElementById("status");
  const replayEl = document.getElementById("replay");

  function setStatus(msg) { statusEl.textContent = msg; }

  function stripHtml(html) {
    const tmp = document.createElement("div");
    tmp.innerHTML = html;
    // remove WordPress "The post … appeared first on …" trailing line
    const text = tmp.textContent || "";
    return text.replace(/The post .+? appeared first on .+$/s, "").trim();
  }

  function splitParagraphs(text) {
    // Split on blank lines or sentences if no blank lines exist
    const blocks = text.split(/\n\s*\n+/).map(s => s.trim()).filter(Boolean);
    if (blocks.length > 1) return blocks;
    // fallback: chunk by ~2-3 sentences
    const sentences = text.split(/(?<=[.!?])\s+(?=[A-Z])/);
    const out = [];
    for (let i = 0; i < sentences.length; i += 2) {
      out.push(sentences.slice(i, i + 2).join(" "));
    }
    return out.filter(Boolean);
  }

  function pickChangelogItem(items) {
    // Prefer items whose link/category mentions "changelog"
    for (const it of items) {
      const link = it.querySelector("link")?.textContent || "";
      const cats = Array.from(it.querySelectorAll("category"))
                        .map(c => c.textContent.toLowerCase());
      if (/changelog/i.test(link) || cats.some(c => c.includes("changelog"))) {
        return it;
      }
    }
    // Fallback: latest item overall
    return items[0] || null;
  }

  function formatDate(pubDate) {
    if (!pubDate) return "";
    const d = new Date(pubDate);
    if (isNaN(d)) return "";
    return d.toLocaleDateString(undefined, {
      year: "numeric", month: "long", day: "numeric"
    });
  }

  async function loadFeed() {
    setStatus("Contacting transmitter…");
    const res = await fetch(FEED_URL, { mode: "cors" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const xmlText = await res.text();
    const xml = new DOMParser().parseFromString(xmlText, "text/xml");
    const parserError = xml.querySelector("parsererror");
    if (parserError) throw new Error("Feed parse error");

    const items = Array.from(xml.querySelectorAll("item"));
    if (!items.length) throw new Error("No items in feed");

    const item = pickChangelogItem(items);
    const title = item.querySelector("title")?.textContent?.trim() || "Untitled";
    const link  = item.querySelector("link")?.textContent?.trim() || "";
    const pub   = item.querySelector("pubDate")?.textContent?.trim() || "";
    const encoded = item.getElementsByTagNameNS(
      "http://purl.org/rss/1.0/modules/content/", "encoded"
    )[0]?.textContent;
    const desc  = item.querySelector("description")?.textContent || "";
    const html  = encoded || desc;

    document.querySelector(".crawl h1").textContent = title;
    dateEl.textContent = formatDate(pub);

    const text = stripHtml(html);
    const paras = splitParagraphs(text);

    bodyEl.innerHTML = "";
    paras.forEach(p => {
      const el = document.createElement("p");
      el.textContent = p;
      bodyEl.appendChild(el);
    });

    if (link) {
      const tail = document.createElement("p");
      tail.style.textAlign = "center";
      tail.style.opacity = "0.85";
      const a = document.createElement("a");
      a.href = "https://leereilly.net/github-changelog-crawl/";
      a.textContent = "May the source be with you.";
      a.style.color = "var(--crawl-yellow)";
      a.style.textDecoration = "underline";
      tail.appendChild(a);
      tail.appendChild(document.createElement("br"));
      const mark = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      mark.setAttribute("viewBox", "0 0 16 16");
      mark.setAttribute("width", "50");
      mark.setAttribute("height", "50");
      mark.setAttribute("aria-hidden", "true");
      mark.style.fill = "var(--crawl-yellow)";
      mark.style.marginTop = "0.4em";
      mark.innerHTML = '<path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>';
      tail.appendChild(mark);
      bodyEl.appendChild(tail);
    }

    // Compute end position and duration from actual content height so
    // the entire crawl scrolls fully off the top, at a roughly constant
    // cinematic speed regardless of entry length.
    const stage = document.querySelector(".stage");
    const stageH = stage.clientHeight || window.innerHeight;
    // Force layout so scrollHeight is accurate
    const contentH = crawlEl.scrollHeight;
    const startPct = 95;
    // Need top to end such that bottom of content is well above the viewport.
    // Element height in % of stage = contentH/stageH*100. Add buffer so the
    // last line clearly disappears into the vanishing point.
    const endPct = -((contentH / stageH) * 100 + 60);
    const rangePx = ((startPct - endPct) / 100) * stageH;
    // ~55 px/sec — slow cinematic; min 60s, max 200s
    const seconds = Math.max(60, Math.min(200, rangePx / 55));

    document.documentElement.style.setProperty("--crawl-duration", seconds + "s");
    document.documentElement.style.setProperty("--crawl-end", endPct + "%");
    setStatus("");
  }

  function startCrawl() {
    crawlEl.style.animation = "none";
    // force reflow so animation restarts
    void crawlEl.offsetWidth;
    crawlEl.style.animation = "";
    replayEl.classList.remove("show");
  }

  crawlEl.addEventListener("animationend", () => {
    replayEl.classList.add("show");
  });
  replayEl.addEventListener("click", startCrawl);

  loadFeed().catch(err => {
    console.error(err);
    setStatus("Transmission failed: " + err.message);
    bodyEl.innerHTML =
      "<p>The transmission was lost in hyperspace.</p>" +
      "<p>Could not reach the GitHub feed (" +
      (err.message || "unknown error") + "). " +
      "Check your connection and try again.</p>";
  });
})();
</script>
</body>
</html>
